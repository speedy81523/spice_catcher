<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>Spice Catcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
 
</head>
<body>
  <!-- <button id="debug-btn" style="position: absolute; top: 0; right: 0;">DEBUG: Lose All Lives</button> -->
  <main class="app">
    <header class="top-bar">
      <div>
        <p class="eyebrow">Mini Game</p>
        <h1>Spice Catcher</h1>
      </div>
      <div class="action-group">
        <button class="start-btn" id="start-btn">Start Game</button>
        <button class="start-btn reset-btn" id="reset-btn" hidden>Play Again</button> <!--hide the reset button, same class as start btn-->
      </div>
    </header>

    <section class="game-shell"> <!--score,live,time info-->
      <div class="game-panel">
        <div class="hud">
          <div class="stat"> 
            <span class="label">Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat">
            <span class="label">Lives</span>
            <strong id="lives">3</strong>
          </div>
          <div class="stat">
            <span class="label">Time</span>
            <strong id="timer">60s</strong>
          </div>
        </div>

        <div class="game-area" id="game-area">
          <div class="game-placeholder">
            <p id = "instruction-placeholder">Catch the falling spices and ingredients!</p>
             
            <span id = "basket-placeholder">Your basket will appear here</span> <!--game area-->
          </div>
          <div id="kadhai" hidden>
            <span class="kadhai-handle kadhai-handle-left"></span>
            <span class="kadhai-handle kadhai-handle-right"></span>
          </div>
        </div>
      </div>

      <aside class="sidebar">
        <div class="card">
          <h2>How to Play</h2>
          <ul>
            <li>Move the basket left and right</li>
            <li>Catch the falling ingredients</li>
            <li>Avoid the pests!</li>
          </ul>
        </div>

        <div class="card">
          <h2>Goal</h2>
          <p>Build the highest score before the timer runs out.</p>
        </div>
      </aside>
    </section>
  </main>
 <script src="game.js"></script>
  
</body>
</html>
